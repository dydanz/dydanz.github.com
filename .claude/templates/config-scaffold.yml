# Jekyll Configuration - Scaffold
# Docs: https://jekyllrb.com/docs/configuration/

# ========================
# Site Settings
# ========================
title: "Your Blog Title"
tagline: "A short tagline"
description: >-
  A longer description for SEO purposes.
  Keep under 160 characters in rendered output.
url: "https://username.github.io"   # No trailing slash
baseurl: ""                          # "" for user site, "/repo" for project site

# ========================
# Author
# ========================
author:
  name: "Your Name"
  email: you@example.com
  url: "https://username.github.io"

# ========================
# Build Settings
# ========================
timezone: Asia/Jakarta
markdown: kramdown
highlighter: rouge
permalink: /:title/

kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false

# ========================
# Theme
# ========================
# Gem-based theme (for branch deploy):
# theme: minima

# Remote theme (supports GitHub-hosted themes):
# remote_theme: user/repo

# ========================
# Plugins
# ========================
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate
  - jekyll-redirect-from

# ========================
# Pagination
# ========================
paginate: 10
paginate_path: "/page/:num/"

# ========================
# Exclude from build
# ========================
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENSE
  - node_modules/
  - vendor/
  - .github/
  - .claude/

# ========================
# Include (override Jekyll defaults)
# ========================
include:
  - _pages

# ========================
# Defaults
# ========================
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      toc: true
      comments: true
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: page

# ========================
# Social / SEO
# ========================
social:
  links:
    - https://github.com/dydanz
    - https://x.com/dydanz
    - https://www.linkedin.com/in/dandi-diputra/

github_username: dydanz
twitter_username: dydanz
