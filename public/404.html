<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>dydanz</title>
    <script>
      // GitHub Pages SPA redirect: forward the path as a query param so index.html can pick it up
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.host + l.pathname.split('/').slice(0, 1).join('/') +
        '/?p=' + encodeURIComponent(l.pathname + l.search) + l.hash
      );
    </script>
  </head>
  <body></body>
</html>
